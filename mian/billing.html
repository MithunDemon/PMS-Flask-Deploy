<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }



        .head {
            width: 100%;
            background-color: rgba(223, 66, 66, 0.808);
            text-align: center;
            color: white;
            padding: 1.5% 0;



        }


        /* Navigation Container */
        .vk {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 20px 0px 20px;

        }

        /* Navigation Links */
        .vk a {
            position: relative;
            text-decoration: none;
            color: #000;
            font-size: 20px;
            font-weight: 400;
            padding: 8px 0;
            transition: color 0.3s ease;
        }

        /* Underline Animation */
        .vk a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0%;
            height: 3px;
            background: #ffffff;
            border-radius: 10px;
            transition: width 0.35s ease-in-out;
        }

        /* Hover Effect */
        .vk a:hover {
            color: white;
        }

        .vk a:hover::after {
            width: 100%;
        }

        body{
    background:#f4f8fb;
    font-family:Arial, Helvetica, sans-serif;
}

form{
    width:90%;
    margin:40px auto;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 25px rgba(0,0,0,.15);
}

label{
    font-size:17px;
    font-weight:bold;
    margin-bottom:8px;
    color:#444;
}

.form-control{
    height:48px;
    border-radius:10px;
    border:1px solid #cfd8dc;
    transition:.3s;
}

.form-control:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,.3);
}

.row{
    margin-bottom:15px;
}

.btn-success{
    width:35%;
    padding:7px;
    font-size:20px;
    border-radius:10px;
    background:#198754;
    border:none;
    transition:.3s;
    margin-left: 32%;
}

.btn-success:hover{
    background:#157347;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.card{
    border:none;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card-body{
    padding:25px;
}

.card h4{
    color:#0d6efd;
    margin-bottom:20px;
    font-weight:bold;
}

#medicine_box{
    margin-top:20px;
}

hr{
    margin:40px 0;
}

.bill-box{
    width:90%;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.bill-box h1{
    color:#198754;
    font-weight:bold;
}

.bill-box h3{
    color:#0d6efd;
}

.bill-box table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

.bill-box th{
    background:#0d6efd;
    color:white;
    padding:12px;
    text-align:center;
}

.bill-box td{
    padding:10px;
    text-align:center;
    border:1px solid #ddd;
}

.bill-box button{
    background:#198754;
    color:white;
    padding:12px 30px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.bill-box button:hover{
    background:#157347;
}
    </style>
</head>

<body>


    <header class="head">
        <h1 style="font-size: 44px;">Pharmacy Management System</h1>
        <div class="vk">

            <a href="{{ url_for('add') }}">

                Add medicine

            </a>


            <a href="{{ url_for('searchmedicine') }}">
                Search medicine

            </a>




            <a href="{{ url_for('update') }}">

                Update medicine

            </a>




            <a href="{{ url_for('view') }}">

                View medicine

            </a>





            <a href="{{ url_for('delete') }}">

                delete medicine

            </a>

            <a href="add.html">

                billing medicine

            </a>

        </div>
    </header>
    <form action="{{ url_for('billing') }}" method="POST">

        <div class="row">

            <div class="col-md-4">
                <label>Account Name</label>
                <input type="text" class="form-control" name="account_name" required>
            </div>

            <div class="col-md-4">
                <label>Medical Name</label>
                <input type="text" class="form-control" name="customer_name" required>
            </div>

            <div class="col-md-4">
                <label>Customer Mobile</label>
                <input type="text" class="form-control" name="customer_mobile" required>
            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-md-4">

                <label>Payment</label>

                <select name="payment" class="form-control">

                    <option>Cash</option>
                    <option>UPI</option>
                    <option>Card</option>

                </select>

            </div>

            <div class="col-md-4">

                <label>Number of Medicines</label>

                <input type="number" id="count" class="form-control" min="1" max="20" required>

            </div>

        </div>

        <br>

        <div id="medicine_box"></div>

        <br>

        <div class="row">

            <div class="col-md-3">

                <label>Discount (%)</label>

                <input type="number" name="discount" class="form-control" value="0">

            </div>

            <div class="col-md-3">

                <label>GST (%)</label>

                <input type="number" name="gst" class="form-control" value="0">

            </div>

        </div>

        <br>

        <button class="btn btn-success btn-lg">
            Generate Bill
        </button>

    </form>
    <hr>

<div style="width:90%; margin:30px auto; background:white; padding:20px; border-radius:10px;">

    {{ messa|safe }}

</div>
    <script>

        document.getElementById("count").addEventListener("change", function () {

            let total = this.value;

            let html = "";

            for (let i = 1; i <= total; i++) {

                html += `

<div class="card shadow mt-3">

<div class="card-body">

<h4>Medicine ${i}</h4>

<div class="row">

<div class="col-md-6">

<label>Medicine Name</label>

<input
type="text"
name="medicine_name[]"
class="form-control"
required>

</div>

<div class="col-md-3">

<label>Quantity</label>

<input
type="number"
name="quantity[]"
class="form-control"
required>

</div>

<div class="col-md-3">

<label>Remark</label>

<input
type="text"
name="remark[]"
class="form-control">

</div>

</div>

</div>

</div>

`;

            }

            document.getElementById("medicine_box").innerHTML = html;

        });

    </script>


</body>

</html>
