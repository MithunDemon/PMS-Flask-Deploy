<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }



        .head {
            width: 100%;
            background-color: rgba(223, 66, 66, 0.808);
            text-align: center;
            color: white;
            padding: 1.5% 0;
            font-size: 20px;



        }

        img {
            width: 600px;
            height: 400px;
        }

        .porfile {
            box-shadow: 0 4px 10px rgba(41, 31, 0, 0.8);
            padding: 10px 50px;
            border-radius: 20px;
            height: 65%;
            cursor: pointer;


        }

        .porfile:hover {
            transform: translateY(-10px);

        }




        .bi {
            font-size: 100px;
            text-align: center;
        }

        h3 {
            color: black;
            text-decoration: none;
            border: none;
            font-weight: 500;
        }



        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px 10px;
            margin-top: 40px;
        }

        .footer h3 {
            margin-bottom: 10px;
        }

        .footer p {
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <header class="head">
        <h1>Pharmacy Management System</h1>
    </header>


    <div style="display: flex;">
        <div>
            <img src="{{ url_for('static', filename='list.png') }}" alt="">
        </div>
        <div style="display: flex;margin-top: 6%;gap: 10%;">

            <a href="{{ url_for('register') }}" style="text-decoration: none;">
                <div class="porfile">
                    <i class="bi bi-people "></i>
                    <h3>Pharmacy <br>Registration <br> Request</h3>
                </div>
            </a>
            <a href="{{ url_for('admin') }}" style="text-decoration: none;">
                <div class="porfile">
                    <i class="bi bi-person-plus"></i>
                    <h3>Admin Login</h3>
                </div>
            </a>
            <a href="{{ url_for('login') }}" style="text-decoration: none;">

                <div class="porfile">
                    <i class="bi bi-person"></i>
                    <h3>login Page</h3>
                </div>
            </a>


        </div>
    </div>


    <footer class="footer">
        <div class="footer-content">
            <h3>Pharmacy Management System</h3>
            <p>Manage Medicines, Stock, Billing and Reports Efficiently</p>
            <p>© 2026 All Rights Reserved | Developed by Mithun</p>
        </div>
    </footer>

</body>

</html>
