<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>
</head>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {

        height: 100vh;
        background: linear-gradient(135deg, #0d6efd, #20c997);
        justify-content: center;
        align-items: center;
    }

    .lp {
        background-color: white;
        padding: 40px 100px;
        margin-top: 7%;
        width: 40%;
        border-radius: 20px;
        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.8);
        margin-left: 30%;
    }

    label {
        text-align: start;
    }



    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #0d6efd;
        font-weight: bold;
    }

    input {
        width: 90%;
        border: none;
        outline: none;
        border-bottom: 1px solid black;

    }

    button {
        padding: 8px 30px;
        border: none;
        width: 50%;
        background-color: orangered;

        box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.8);
        border-radius: 4px;
        margin-left: 80px;
    }

    .footer {
        background: #2c3e50;
        color: white;
        text-align: center;
        padding: 25px 10px;
        margin-top: 40px;
    }

    .footer h3 {
        margin-bottom: 10px;
    }

    .footer p {
        margin: 5px 0;
    }
</style>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light" style=" box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.8);">
        <div class="container-fluid">

            <div class="collapse navbar-collapse" id="navbarSupportedContent" style="text-align: center;">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>

                </ul>

            </div>
        </div>
    </nav>





    <div class="lp">



        <h2>Admin Login</h2>

        <form method="POST">

            <label>Username</label><br>
            <input type="text" name="username" required autocomplete="off"><br><br>

            <label>Password</label><br>
            <input type="password" name="password" required autocomplete="off"><br><br>

            <button type="submit">Login</button>

        </form>

        <p style="color:red;">{{ message }}</p>
    </div>


    <footer class="footer">
        <div class="footer-content">
            <h3>Pharmacy Management System</h3>
            <p>Manage Medicines, Stock, Billing and Reports Efficiently</p>
            <p>© 2026 All Rights Reserved | Developed by Mithun</p>
        </div>
    </footer>

</body>

</html>
