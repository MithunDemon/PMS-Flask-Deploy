<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #20c997);
            height: 100vh;


            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 420px;
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .2);
            margin-left: 35%;
            margin-top: 5%;

        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #0d6efd;
            font-weight: bold;
        }

        .btn-login {
            width: 100%;
            border-radius: 30px;

        }

        a {
            text-decoration: none;
        }

        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 25px 10px;
            margin-top: 40px;
        }

        .footer h3 {
            margin-bottom: 10px;
        }

        .footer p {
            margin: 5px 0;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light" style="   box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.8);">
        <div class="container-fluid">

            <div class="collapse navbar-collapse" id="navbarSupportedContent" style="text-align: center;">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>

                </ul>

            </div>
        </div>
    </nav>


    <div class="login-box">

        <h2>Pharmacy Login</h2>

        <form method="POST" action="/login">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Username" autocomplete="off" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter Password" autocomplete="off" required>
            </div>

            <button class="btn btn-primary btn-login">
                Login
            </button>

        </form>

        <hr>

        <div class="text-center">

            <p>New Pharmacy?</p>

            <a href="/register" class="btn btn-success">
                Register Pharmacy
            </a>

        </div>

    </div>


    <footer class="footer">
        <div class="footer-content">
            <h3>Pharmacy Management System</h3>
            <p>Manage Medicines, Stock, Billing and Reports Efficiently</p>
            <p>© 2026 All Rights Reserved | Developed by Mithun</p>
        </div>
    </footer>


</body>

</html>
